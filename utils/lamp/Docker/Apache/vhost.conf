# Docker/Apache/vhost.conf
# Virtual hosting dinámico multi-proyecto estilo XAMPP
#
# USO:
#   1. Crea tu proyecto en ~/workspace/http/<nombre>/
#   2. Asegúrate de que el DocumentRoot esté en <nombre>/public/
#      (si tu proyecto no usa public/, crea un symlink: ln -s . public)
#   3. Agrega a /etc/hosts:  127.0.0.1 <nombre>.localhost
#   4. Accede: http://<nombre>.localhost
#
# Ejemplo:
#   Proyecto     Ruta                                     URL
#   ───────────  ───────────────────────────────────────  ────────────────────────
#   Laravel      ~/workspace/http/mi-api/public/          http://mi-api.localhost
#   WordPress    ~/workspace/http/mi-blog/public → ./     http://mi-blog.localhost
#   PHP vanilla   ~/workspace/http/legacy/                 http://localhost/legacy/

<VirtualHost *:80>
    # Este vhost captura cualquier hostname que NO sea "localhost"
    ServerName dynamic.localhost
    ServerAlias *.localhost

    # %1 = primer segmento del hostname (ej: "miapp" de "miapp.localhost")
    VirtualDocumentRoot /var/www/html/%1/public

    # Si quieres servir desde la raíz del proyecto sin /public,
    # cambia la línea de arriba por:
    # VirtualDocumentRoot /var/www/html/%1

    <Directory /var/www/html>
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Require all granted

        # Reescritura para frameworks (Laravel, Symfony, Slim...)
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^ index.php [L]
        </IfModule>
    </Directory>

    # Logs por separado para no mezclar con el default
    ErrorLog  /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
