# Walker Configuration - Gruvbox Material Theme
# Alejandro Cabeza's Dotfiles

force_keyboard_focus = false
close_when_open = true
click_to_close = true
as_window = false
single_click_activation = true
selection_wrap = false
global_argument_delimiter = "#"
exact_search_prefix = "'"
theme = "default"
disable_mouse = false
debug = false
page_jump_items = 10
hide_quick_activation = false
hide_action_hints = false
hide_action_hints_dmenu = true
hide_return_action = false
keybind_symbols = true
resume_last_query = false
actions_as_menu = false
autoplay_videos = false
ext_background_effect_blur = false

[shell]
exclusive_zone = -1
layer = "overlay"
anchor_top = true
anchor_bottom = true
anchor_left = true
anchor_right = true

[columns]
"symbols" = 3

[placeholders]
"default" = { input = "Buscar...", list = "Sin resultados" }
"desktopapplications" = { input = "Aplicaciones...", list = "No se encontraron aplicaciones" }
"files" = { input = "Archivos...", list = "No se encontraron archivos" }
"calc" = { input = "Calculadora...", list = "Expresión inválida" }
"websearch" = { input = "Buscar en la web...", list = "Sin resultados" }
"clipboard" = { input = "Clipboard...", list = "Clipboard vacío" }
"runner" = { input = "Comando...", list = "Comando no encontrado" }

[keybinds]
close = ["Escape"]
next = ["Down"]
previous = ["Up"]
left = ["Left"]
right = ["Right"]
down = ["Down"]
up = ["Up"]
toggle_exact = ["ctrl e"]
resume_last_query = ["ctrl r"]
quick_activate = ["F1", "F2", "F3", "F4"]
page_down = ["Page_Down"]
page_up = ["Page_Up"]
show_actions = ["alt j"]

[providers]
default = [
  "desktopapplications",
  "calc",
  "websearch",
  "files",
]
empty = ["desktopapplications"]
ignore_preview = []
max_results = 50

[providers.sets]

[[providers.prefixes]]
prefix = ";"
provider = "providerlist"

[[providers.prefixes]]
prefix = ">"
provider = "runner"

[[providers.prefixes]]
prefix = "/"
provider = "files"

[[providers.prefixes]]
prefix = "."
provider = "symbols"

[[providers.prefixes]]
prefix = "!"
provider = "todo"

[[providers.prefixes]]
prefix = "%"
provider = "bookmarks"

[[providers.prefixes]]
prefix = "="
provider = "calc"

[[providers.prefixes]]
prefix = "@"
provider = "websearch"

[[providers.prefixes]]
prefix = ":"
provider = "clipboard"

[[providers.prefixes]]
prefix = "$"
provider = "windows"

[providers.clipboard]
time_format = "relative"

[providers.actions]
fallback = [
  { action = "menus:open", label = "open", after = "Nothing" },
  { action = "menus:default", label = "run", after = "Close" },
  { action = "menus:parent", label = "back", bind = "Escape", after = "Nothing" },
  { action = "erase_history", label = "clear hist", bind = "ctrl h", after = "AsyncReload" },
]

dmenu = [{ action = "select", default = true, bind = "Return" }]

providerlist = [
  { action = "activate", default = true, bind = "Return", after = "ClearReload" },
]

desktopapplications = [
  { action = "start", default = true, bind = "Return" },
  { action = "start:keep", label = "open+next", bind = "shift Return", after = "KeepOpen" },
  { action = "new_instance", label = "new instance", bind = "ctrl Return" },
  { action = "pin", bind = "ctrl p", after = "AsyncReload" },
  { action = "unpin", bind = "ctrl p", after = "AsyncReload" },
]

calc = [
  { action = "copy", default = true, bind = "Return" },
  { action = "delete", bind = "ctrl d", after = "AsyncReload" },
  { action = "delete_all", bind = "ctrl shift d", after = "AsyncReload" },
  { action = "save", bind = "ctrl s", after = "AsyncClearReload" },
]

websearch = [
  { action = "search", default = true, bind = "Return" },
  { action = "open_url", label = "open url", default = true, bind = "Return" },
]

files = [
  { action = "open", default = true, bind = "Return" },
  { action = "opendir", label = "open dir", bind = "ctrl Return" },
  { action = "copypath", label = "copy path", bind = "ctrl shift c" },
  { action = "copyfile", label = "copy file", bind = "ctrl c" },
  { action = "refresh_index", label = "reload", bind = "ctrl r", after = "AsyncReload" },
]

runner = [
  { action = "run", default = true, bind = "Return" },
  { action = "runterminal", label = "run in terminal", bind = "shift Return" },
]

clipboard = [
  { action = "copy", default = true, bind = "Return" },
  { action = "remove", bind = "ctrl d", after = "AsyncClearReload" },
  { action = "remove_all", label = "clear", bind = "ctrl shift d", after = "AsyncClearReload" },
  { action = "pin", bind = "ctrl p", after = "AsyncClearReload" },
  { action = "unpin", bind = "ctrl p", after = "AsyncClearReload" },
]

symbols = [
  { action = "run_cmd", label = "select", default = true, bind = "Return" },
]

todo = [
  { action = "save", default = true, bind = "Return", after = "AsyncClearReload" },
  { action = "delete", bind = "ctrl d", after = "AsyncClearReload" },
  { action = "clear", bind = "ctrl x", after = "AsyncClearReload" },
]
