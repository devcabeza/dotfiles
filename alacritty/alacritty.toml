# Alacritty — Gruvbox Material + Tmux

[window]
decorations = "none"
opacity = 0.95
padding = { x = 8, y = 8 }
dynamic_padding = true
dimensions = { columns = 120, lines = 35 }

[font]
normal = { family = "Hack Nerd Font Mono", style = "Regular" }
bold = { family = "Hack Nerd Font Mono", style = "Bold" }
italic = { family = "Hack Nerd Font Mono", style = "Italic" }
bold_italic = { family = "Hack Nerd Font Mono", style = "Bold Italic" }
size = 12

[terminal.shell]
program = "bash"
args = ["-c", "tmux attach || tmux new-session"]

[colors.primary]
background = "#282828"
foreground = "#ddc7a1"
dim_foreground = "#a89984"
bright_foreground = "#ebdbb2"

[colors.normal]
black = "#3c3836"
red = "#ea6962"
green = "#a9b665"
yellow = "#d8a657"
blue = "#7daea3"
magenta = "#d3869b"
cyan = "#89b482"
white = "#ddc7a1"

[colors.bright]
black = "#928374"
red = "#ea6962"
green = "#a9b665"
yellow = "#d8a657"
blue = "#7daea3"
magenta = "#d3869b"
cyan = "#89b482"
white = "#ebdbb2"

[colors.cursor]
cursor = "#ddc7a1"
text = "#282828"

[colors.selection]
background = "#504945"
text = "#ebdbb2"

[colors.vi_mode_cursor]
cursor = "#d8a657"
text = "#282828"

[cursor]
style = { shape = "Block", blinking = "On" }

[[keyboard.bindings]]
key = "L"
mods = "Control"
action = "None"

[[keyboard.bindings]]
key = "C"
mods = "Alt"
chars = "\u000c"
