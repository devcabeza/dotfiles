# -- Monitors --
# monitor=nombre,resolucion,posicion,refresh_rate,scale
monitor=,1920x1080@60,0x0,1

# -- Autorestart --
exec-once=~/.dotfiles/scripts/wallpaper_carousel.sh
exec-once=waybar --config /home/alejandrocabeza/.dotfiles/waybar/config.jsonc --style /home/alejandrocabeza/.dotfiles/waybar/styles.css

# -- Notifications, WiFi, Bluetooth --
exec-once = dunst
exec-once = blueman-applet
exec-once = nm-applet

# -- Entrada (Teclado y Mouse) ---
input {
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
    sensitivity = 0

    # Teclado inglés internacional con ALT Gr (sin dead keys)
    kb_layout = us
    kb_variant = altgr-intl
    kb_options = compose:menu,terminate:ctrl_alt_bksp
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle # "dwindle" o "master"
    allow_tearing = false
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# -- Applications --
$mainMod = SUPER
$altMod = ALT
$menu = hyprlauncher --dmenu
$filemanager = nautilus
$terminal = alacritty

# -- Binds Básicos --
bind = $mainMod, F, exec, $filemanager
bind = $altMod, SPACE, exec, $menu
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Q, exit
bind = $mainMod, W, killactive
bind = $mainMod SHIFT, M, togglefloating,
bind = $mainMod, M, fullscreen, 0

# -- Movimiento de Foco (Estilo Vim Corregido) --
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# -- Workspaces --
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4

binde = $mainMod SHIFT, right, resizeactive, 10 0
binde = $mainMod SHIFT, left, resizeactive, -10 0
binde = $mainMod SHIFT, up, resizeactive, 0 -10
binde = $mainMod SHIFT, down, resizeactive, 0 10

# -- Mouse Binds --
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# -- WiFi, Bluetooth, Notifications --
bind = $mainMod, N, exec, ~/.dotfiles/scripts/wifi_menu.sh
bind = $mainMod, B, exec, ~/.dotfiles/scripts/bluetooth_toggle.sh
bind = , Print, exec, dunstctl history-pop
bind = , Scroll_Lock, exec, dunstctl close
bind = $mainMod SHIFT, N, exec, dunstctl history

# -- Screenshots with grim/slurp --
bind = $mainMod SHIFT, S, exec, ~/.dotfiles/scripts/screenshot.sh

# -- Controles Multimedia (Audio y Brillo) --
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brillo de pantalla (requiere brightnessctl)
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# -- Mover ventanas dentro del mosaico (Estilo Vim) --
bind = $mainMod SHIFT, H, swapwindow, l
bind = $mainMod SHIFT, L, swapwindow, r
bind = $mainMod SHIFT, K, swapwindow, u
bind = $mainMod SHIFT, J, swapwindow, d

# -- Sistema y Sesión --
bind = $mainMod, Escape, exec, hyprlock
bind = $mainMod SHIFT, R, exec, hyprctl reload

# -- Atajos de Teclado (Wofi) --
bind = $mainMod, slash, exec, ~/.dotfiles/scripts/keybinds_menu.sh

# -- Gestor de Paquetes (fzf) --
bind = $mainMod SHIFT, P, exec, ~/.dotfiles/scripts/package_manager.sh

# -- Scratchpad (Workspace Especial) --
bind = $mainMod SHIFT, Minus, movetoworkspace, special
bind = $mainMod, Minus, togglespecialworkspace,
