# -- Monitors --
# monitor=nombre,resolucion,posicion,refresh_rate,scale
monitor=,preferred,1920x1080@60,1

# -- Autorestart --
# exceptions=program1,program2
# exec-once=~/.dotfiles/scripts/wallpaper_carousel.sh
exec-once=waybar

# -- Notifications, WiFi, Bluetooth --
exec-once = dunst
exec-once = blueman-applet
exec-once = nm-applet

# -- Entrada (Teclado y Mouse) ---
input {
        follow_mouse=1
        touchpad {
                natural_scroll=false
        }
        sensitivity = 0

        # Teclado inglés internacional con dead keys y ALT Gr
        kb_layout = us
        kb_variant = intl
        kb_options = compose:menu,terminate:ctrl_alt_bksp
}


general {
        gaps_in = 5
        gaps_out = 10
        border_size = 2
        col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
        col.inactive_border = rgba(595959aa)

        layout = dwindle # "dwindle" o "master"
        allow_tearing = false
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# -- Aplication --
$mainMod = SUPER
$altMod = ALT
$menu = wofi --show drun
$filemanager = nautilus
$terminal = ghostty

bind = $mainMod, F, exec, $filemanager
bind = $altMod, SPACE, exec, $menu
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Q, exit
bind = $mainMod, W, killactive

bind = $mainMod, L, movefocus, l
bind = $mainMod, H, movefocus, r
bind = $mainMod, J, movefocus, u
bind = $mainMod, K, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# -- Teclado internacional --
# Recargar configuración de teclado al iniciar (opcional, las opciones en input ya se aplican)
exec-once = setxkbmap -model pc105 -layout us -variant intl -option compose:menu,terminate:ctrl_alt_bksp

# -- WiFi, Bluetooth, Notifications --
bind = $mainMod, N, exec, ~/.dotfiles/scripts/wifi_menu.sh
bind = $mainMod, B, exec, ~/.dotfiles/scripts/bluetooth_toggle.sh
bind = , Print, exec, dunstctl capture
bind = , Scroll_Lock, exec, dunstctl close
bind = $mainMod SHIFT, N, exec, dunstctl history

# -- Screenshots with grim/slurp --
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy


