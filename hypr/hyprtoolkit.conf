# ============================================
# Hyprtoolkit Theme - Prueba visible
# Colores muy distintos a los defaults para
# verificar que el theme se aplica
# ============================================
# Colores en formato 0xAARRGGBB (Alpha, RGB)

# -- Fondo y base --
background     = 0xFF1A1B2F    # Azul oscuro profundo
base           = 0xFF252640    # Azul medianoche
alternate_base = 0xFF30325A    # Azul violáceo

# -- Texto --
text           = 0xFFE0E0FF    # Blanco azulado
bright_text    = 0xFFFFFFFF    # Blanco puro

# -- Acentos --
accent           = 0xFF7DCFFF  # Azul cielo brillante
accent_secondary = 0xFFFF9E64  # Naranja cálido

# -- Tamaños de fuente --
h1_size         = 19
h2_size         = 15
h3_size         = 13
font_size       = 13           # Aumentado de 11 a 13
small_font_size = 10

# -- Iconos y fuentes --
icon_theme               = 
font_family              = Sans Serif
font_family_monospace    = monospace

# -- Esquinas redondeadas --
rounding_large = 15       # Aumentado de 10 a 15
rounding_small = 8        # Aumentado de 5 a 8
