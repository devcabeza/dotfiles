# ============================================
# Hyprtoolkit Theme
# Paleta basada en Gruvbox, a juego con
# los bordes de Hyprland (active: #7daea3)
# ============================================
# Colores en formato 0xAARRGGBB (Alpha, RGB)

# -- Fondo y base --
background     = 0xFF1D2021    # Fondo oscuro (gruvbox dark0)
base           = 0xFF282828    # Base ligeramente más claro
alternate_base = 0xFF32302F    # Base alterna para contraste

# -- Texto --
text           = 0xFFEBDBB2    # Texto cálido claro
bright_text    = 0xFFFBF1C7    # Texto brillante (para selecciones)

# -- Acentos --
accent           = 0xFF7DAEA3  # Teal - coincide con active_border
accent_secondary = 0xFF83C092  # Verde suave secundario

# -- Tamaños de fuente --
h1_size         = 19
h2_size         = 15
h3_size         = 13
font_size       = 12
small_font_size = 10

# -- Iconos y fuentes --
icon_theme               = 
font_family              = Sans Serif
font_family_monospace    = monospace

# -- Esquinas redondeadas --
rounding_large = 12
rounding_small = 6
