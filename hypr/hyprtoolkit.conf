# ============================================
# Hyprtoolkit Theme - Gruvbox Material
# Paleta oficial Gruvbox Material oscuro,
# igual que los bordes de Hyprland.
# Aspecto tipo Alfred (macOS launcher)
# ============================================
# Colores en formato 0xAARRGGBB (Alpha, RGB)

# -- Fondo y base (Gruvbox Material bg0, bg1, bg2) --
background     = 0xFF1D2021    # bg0  - fondo más oscuro
base           = 0xFF282828    # bg1  - base
alternate_base = 0xFF32302F    # bg2  - alterno

# -- Texto (Gruvbox Material fg0, fg1) --
text           = 0xFFEBDBB2    # fg1  - texto cálido claro
bright_text    = 0xFFFBF1C7    # fg0  - texto brillante

# -- Acentos --
accent           = 0xFF7DAEA3  # Teal - IGUAL que active_border de Hyprland
accent_secondary = 0xFFA9B665  # Verde Gruvbox

# -- Tamaños de fuente (más grandes, tipo Alfred) --
h1_size         = 20
h2_size         = 16
h3_size         = 14
font_size       = 14           # 14px - más legible
small_font_size = 11

# -- Iconos y fuentes --
icon_theme               = 
font_family              = Sans Serif
font_family_monospace    = monospace

# -- Esquinas redondeadas --
rounding_large = 16
rounding_small = 8
