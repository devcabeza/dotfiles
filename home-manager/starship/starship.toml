palette = "noctalia"

# --- Módulos ---

add_newline = true

line_break = { disabled = true }

# Formato principal (usa las referencias de paleta)
format = "[](fg:@noctalia.overlay2)$username[](fg:@noctalia.yellow bg:@noctalia.overlay2)$directory[](fg:@noctalia.green bg:@noctalia.yellow)$git_branch$git_status[](fg:@noctalia.blue bg:@noctalia.green)$nix_shell[](fg:@noctalia.surface0 bg:@noctalia.blue)$cmd_duration[ ](fg:@noctalia.surface0)$character"

[character]
success_symbol = "[➜](bold @noctalia.green)"
error_symbol = "[➜](bold @noctalia.red)"

[username]
show_always = true
style_user = "bg:@noctalia.overlay2 fg:@noctalia.crust"
format = "[$user]($style)"

[directory]
style = "bg:@noctalia.yellow fg:@noctalia.crust"
format = "[ $path ]($style)"
truncation_length = 3
fish_style_pwd_dir_length = 1

[git_branch]
symbol = " "
style = "bg:@noctalia.green fg:@noctalia.crust"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "bg:@noctalia.green fg:@noctalia.crust"
format = "([$all_status$ahead_behind]($style))"
ahead = "⇡${count}"
behind = "⇣${count}"

[nix_shell]
symbol = " "
style = "bg:@noctalia.blue fg:@noctalia.crust"
format = "[ $symbol]($style)"

[cmd_duration]
style = "bg:@noctalia.surface0 fg:@noctalia.yellow"
format = "[  $duration ]($style)"

