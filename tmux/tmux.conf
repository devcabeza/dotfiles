# =============================================================================
# ~/.dotfiles/tmux.conf — Configuración standalone de tmux
# Gestionada manualmente, enlazada via home-manager
# =============================================================================

# --- Terminal y Comportamiento Básico ---
set -g default-terminal "tmux-256color"
set -g repeat-time 0
set -g focus-events on
set -g mouse on
set -g history-limit 64096
set -sg escape-time 0
set -g status-interval 1
set -g status-position top
set -g set-clipboard on

# --- Prefix: C-t ---
unbind C-b
set -g prefix C-t

# --- Modo vi ---
set-window-option -g mode-keys vi

# --- Recarga ---
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# --- Copy-mode con wl-copy (Wayland) ---
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"

# --- Utilidades ---
bind O run-shell "xdg-open #{pane_current_path}"
bind -r e kill-pane -a

# --- Navegación entre panes (hjkl) ---
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# --- Redimensionar panes (C-hjkl) ---
bind -r C-k resize-pane -U 5
bind -r C-j resize-pane -D 5
bind -r C-h resize-pane -L 5
bind -r C-l resize-pane -R 5

# --- Splits con directorio actual ---
bind / split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind %
unbind '"'

# --- Popup / Ventana flotante (tmux 3.2+) ---
bind f display-popup -w 80% -h 80% -d "#{pane_current_path}"
bind g display-popup -w 90% -h 90% -d "#{pane_current_path}" -E "lazygit"
bind s display-popup -w 90% -h 90% -d "#{pane_current_path}" -E "lazyssh"
bind d display-popup -w 90% -h 90% -d "#{pane_current_path}" -E "lazydocker"
bind o display-popup -w 90% -h 90% -d "#{pane_current_path}" -E "opencode"

# =============================================================================
# GRUVBOX MATERIAL COLOR SCHEME
# =============================================================================
set -g status-justify "left"
set -g status-style "bg=#282828,fg=#dfbf8e"

# Pane borders
set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#a9b665"

# Status bar design
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left "#[fg=#282828,bg=#a9b665,bold] #S #[fg=#a9b665,bg=#282828,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#504945,bg=#282828,nobold,nounderscore,noitalics]#[fg=#dfbf8e,bg=#504945] %Y-%m-%d  %H:%M #[fg=#a9b665,bg=#504945,nobold,nounderscore,noitalics]#[fg=#282828,bg=#a9b665,bold] #h "

# Window tabs
setw -g window-status-activity-style "underscore,fg=#a89984,bg=#282828"
setw -g window-status-separator ""
setw -g window-status-style "fg=#dfbf8e,bg=#282828"
setw -g window-status-format "#[fg=#282828,bg=#282828,nobold,nounderscore,noitalics]#[default] #I  #W #[fg=#282828,bg=#282828,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#282828,bg=#45403d,nobold,nounderscore,noitalics]#[fg=#dfbf8e,bg=#45403d,bold] #I  #W #[fg=#45403d,bg=#282828,nobold,nounderscore,noitalics]"

# =============================================================================
# PLUGINS VIA TPM (Tmux Plugin Manager)
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-fzf'

# Inicializar TPM (al final del archivo)
run '~/.config/tmux/plugins/tpm/tpm'
