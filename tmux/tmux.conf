# =============================================================================
# ~/.dotfiles/tmux.conf — Configuración standalone de tmux
# Gestionada manualmente, enlazada via home-manager
# =============================================================================

# --- Terminal y Comportamiento Básico ---
set -g default-terminal "tmux-256color"
set -g repeat-time 0
set -g focus-events on
set -g mouse on
set -g history-limit 64096
set -sg escape-time 0
set -g status-interval 1
set -g status-position top
set -g set-clipboard on

# --- Prefix: C-t ---
unbind C-b
set -g prefix C-t

# --- Modo vi ---
set-window-option -g mode-keys vi

# --- Recarga ---
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# --- Copy-mode con wl-copy (Wayland) ---
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"

# --- Utilidades ---
bind O run-shell "xdg-open #{pane_current_path}"
bind -r e kill-pane -a

# --- Navegación entre panes (hjkl) ---
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# --- Redimensionar panes (C-hjkl) ---
bind -r C-k resize-pane -U 5
bind -r C-j resize-pane -D 5
bind -r C-h resize-pane -L 5
bind -r C-l resize-pane -R 5

# --- Splits con directorio actual ---
bind / split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind %
unbind '"'

# --- Popup / Ventana flotante (tmux 3.2+) ---
bind f display-popup -w 80% -h 80% -d "#{pane_current_path}"
bind g display-popup -w 90% -h 90% -d "#{pane_current_path}" -E "lazygit"
bind s display-popup -w 90% -h 90% -d "#{pane_current_path}" -E "lazyssh"
bind d display-popup -w 90% -h 90% -d "#{pane_current_path}" -E "lazydocker"
bind o display-popup -w 90% -h 90% -d "#{pane_current_path}" -E "opencode"

# =============================================================================
# NOCTALIA COLOR SCHEME (cargado desde archivo externo)
# =============================================================================
source-file ~/.config/tmux/current-theme.conf

# =============================================================================
# PLUGINS VIA TPM (Tmux Plugin Manager)
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-fzf'

# Inicializar TPM (al final del archivo)
run '~/.config/tmux/plugins/tpm/tpm'
