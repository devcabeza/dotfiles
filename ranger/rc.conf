# Ranger Configuration Overrides
# ==========================================

# Use the preview script
set use_preview_script true
set preview_script ~/.config/ranger/scope.sh

# Enable image previews
set preview_images true

# Preview image method:
# - ghostty, kitty, wezterm: 'kitty' (native protocol, high quality, wayland-friendly)
# - alacritty, tmux, others: 'ueberzug' (uses ueberzugpp daemon)
set preview_images_method kitty

# General Preview Settings
set preview_files true
set preview_directories true
set collapse_preview true
set draw_borders true

# Keybindings
# Open file with default GUI application using xdg-open in the background.
# Note: Lowercase 'o' overrides the default sorting prefix menu in ranger.
# If you want to keep the sorting menu, you can change 'o' to capital 'O' below.
map o shell xdg-open %f &
