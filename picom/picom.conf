# ~/.dotfiles/picom/picom.conf
# Compositor para X11 — proporciona blur, sombras y redondeo
# que Qtile (en X11) no puede hacer por sí mismo
#
# Uso:
#   picom --experimental-backends --config ~/.config/picom/picom.conf
#   (o desde autostart, ya configurado en qtile/config.py)

#################################
#          Sombras              #
#################################

# Sombra para ventanas en general
shadow = true;
shadow-radius = 7;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.5;

# Color de sombra ≈ Gruvbox Material bg0_h
shadow-red = 0.11;
shadow-green = 0.13;
shadow-blue = 0.13;

# Sin sombra para la barra y docks
shadow-exclude = [
  "class_g = 'waybar'",
  "class_g = 'dunst'",
  "class_i = 'polybar'",
  "name = 'Notification'",
  "name = 'Dunst'",
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'",
];

#################################
#          Transparencia        #
#################################

inactive-opacity = 0.92;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
opacity-rule = [
  "100:class_g = 'Alacritty'",
  "100:class_g = 'firefox'",
  "100:class_g = 'Code'",
  "100:class_g = 'code-oss'",
];

#################################
#          Blur                 #
#################################

# Kawase blur — similar al de Hyprland (blur/passes = 2)
blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;
blur-background-exclude = [
  "class_g = 'waybar'",
  "class_g = 'dunst'",
];

blur:
{
  method = "kawase";
  strength = 5;           # ≈ blur size = 5
  deviation = 1.0;
  passes = 2;             # ≈ blur passes = 2
};

# Mejora visual del blur
blur-kern = "3x3box";
blur-method = "kawase";
blur-strength = 5;

#################################
#          Redondeo             #
#################################

# NOTA: para rounded corners necesitas picom-ft (fork con soporte)
# https://github.com/FT-Labs/picom
# En Nix: pkgs.picom-rounded
# corner-radius = 10;

#################################
#          Animaciones          #
#################################

# picom NO tiene animaciones de ventanas.
# Esto es una limitación fundamental vs Hyprland.
# Las ventanas aparecen/desaparecen instantáneamente.

#################################
#          Fading               #
#################################

fading = true;
fade-delta = 5;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-exclude = [];

#################################
#          Render               #
#################################

backend = "glx";
vsync = true;
unredir-if-possible = false;
detect-rounded-corners = true;
detect-client-opacity = true;
refresh-rate = 60;

#################################
#          Reglas               #
#################################

wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.9; focus = false; };
  dock = { shadow = false; };
  desktop = { shadow = false; };
  popup_menu = { opacity = 0.95; };
  dropdown_menu = { opacity = 0.95; };
};
